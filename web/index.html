<!doctype html>
<html lang="cs">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Obsazování dabingu / Dubbing Casting</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <div class="shell">
      <header class="topbar">
        <div>
          <p class="eyebrow">Dabing Workspace</p>
          <h1 data-i18n="title"></h1>
          <p class="lede" data-i18n-html="lede"></p>
        </div>
        <div class="topbar-actions">
          <div class="lang-switcher">
            <button id="lang-cs-button" class="button button-ghost is-active" data-lang="cs">CS</button>
            <button id="lang-en-button" class="button button-ghost" data-lang="en">EN</button>
          </div>
          <label class="title-field">
            <span data-i18n="projectNameLabel"></span>
            <input id="project-title" type="text" />
          </label>
          <button id="analyze-button" class="button button-primary" data-i18n="recalculate"></button>
          <button id="export-button" class="button" data-i18n="exportXlsx"></button>
        </div>
      </header>

      <main class="workspace">
        <section class="input-pane">
          <div class="section-header">
            <div>
              <p class="section-kicker" data-i18n="inputKicker"></p>
              <h2 data-i18n="episodesHeading"></h2>
            </div>
            <div class="episode-actions">
              <button id="clear-current-button" class="button button-ghost" data-i18n="clearActive"></button>
              <label class="file-button button button-ghost">
                <span data-i18n="loadFile"></span>
                <input id="episode-file-input" type="file" accept=".csv,.tsv,.txt" />
              </label>
            </div>
          </div>

          <div id="episode-tabs" class="episode-tabs"></div>

          <label class="episode-editor">
            <span id="episode-label"></span>
            <textarea
              id="episode-content"
              spellcheck="false"
            ></textarea>
          </label>

          <div class="format-hint">
            <p data-i18n="formatsSupported"></p>
            <ul>
              <li data-i18n-html="formatRaw"></li>
              <li data-i18n-html="formatSummary"></li>
            </ul>
          </div>
        </section>

        <section class="main-pane">
          <div class="section-header">
            <div>
              <p class="section-kicker" data-i18n="castingKicker"></p>
              <h2 data-i18n="fullCastHeading"></h2>
            </div>
            <div id="summary-badges" class="summary-badges"></div>
          </div>

          <div class="table-wrap">
            <table id="casting-table">
              <thead></thead>
              <tbody></tbody>
            </table>
          </div>
        </section>

        <aside class="summary-pane">
          <div class="section-header">
            <div>
              <p class="section-kicker" data-i18n="summaryKicker"></p>
              <h2 data-i18n="actorsHeading"></h2>
            </div>
          </div>
          <div id="actor-summary" class="actor-summary"></div>
          <div id="status-box" class="status-box"></div>
        </aside>
      </main>
    </div>

    <template id="badge-template">
      <div class="badge">
        <span class="badge-label"></span>
        <strong class="badge-value"></strong>
      </div>
    </template>

    <script src="/app.js" defer></script>
  </body>
</html>
